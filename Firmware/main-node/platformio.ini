; =============================================================================
; main-node  —  VIEWE 4.3" board (ESP32-S3 + RGB LCD + touch + SD)
;
; UI, session state machine, JPEG decode + display, SD storage, WiFi softAP +
; HTTP server + QR. See ../photobooth_build_plan.md §6.
;
; PSRAM is REQUIRED (LVGL draw buffers + JPEG decode target + received frame
; buffers). Confirm the exact board variant / PSRAM type against the VIEWE
; demo before first build.
; =============================================================================
; Only build/upload the real app by default. The `diag` env is opt-in via
; `-e diag`, so the Upload button never accidentally flashes the diagnostic.
[platformio]
default_envs = viewe_esp32s3

[env:viewe_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1        ; generic S3; adjust flash/psram to the VIEWE
framework = arduino

; --- 16 MB flash / OPI PSRAM are typical for these VIEWE panels; CONFIRM. ---
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv

; The link diagnostic (src/link_diag.cpp) has its own setup()/loop() and is only
; built in [env:diag]. Exclude it here so it doesn't clash with main.cpp.
build_src_filter = +<*> -<link_diag.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE     ; use our include/lv_conf.h
    ; PNGdec's default line buffer only fits 320px-wide RGBA images; filter
    ; overlays are up to 800px wide RGBA. Two lines of (800*4+1) plus the
    ; decoder's 16-byte alignment slack per line — round up generously.
    -DPNG_MAX_BUFFERED_PIXELS=8192
    ; BT5 extended advertising: the Xprinter accepts connections from phones
    ; (BT5) but ignores legacy CONNECT_IND -> consistent HCI 0x3E. Enable the
    ; extended scan/connect path in NimBLE.
    -DCONFIG_BT_NIMBLE_EXT_ADV=1
    -DCORE_DEBUG_LEVEL=3
    -I include
    ; Debug `Serial` -> UART0 (GPIO43/44 -> CH340 -> COM port). The camera
    ; link moved off 43/44 (now on 0/17), so UART0 is free for logging again.
    ; Native USB CDC was a dead end on this board: GPIO19/20 are wired to the
    ; touch controller, so CDC prints went nowhere.
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_extra_dirs = ../shared
lib_deps =
    photobooth
    lvgl/lvgl@^8.3.11
    ; 1.3.x is compatible with the Arduino-ESP32 2.0.x core that stock
    ; `platform = espressif32` installs. 1.4.x needs the 3.x core
    ; (esp32-hal-periman.h). If you move to the pioarduino/core-3.x platform,
    ; bump this back to ^1.4.9.
    moononournation/GFX Library for Arduino@1.3.7
    bitbank2/JPEGDEC@^1.6.1
    bitbank2/PNGdec@^1.0.1      ; decodes /filters/*.png overlays from the SD
    h2zero/NimBLE-Arduino@^1.4.2  ; BLE client for the Xprinter (lighter than Bluedroid)
    ricmoo/QRCode@^0.0.1
    tamctec/TAMC_GT911@^1.0.2   ; capacitive touch; swap for your panel's controller

monitor_speed = 115200

; --- Milestone-1 link diagnostic (build plan §10.1) --------------------------
; Compiles ONLY src/link_diag.cpp (no display / SD / WiFi): parses frames from
; the XIAO, prints OK/badCRC counts + the counter, and ACKs each one back.
; Build/upload with:  pio run -e diag -t upload
[env:diag]
extends = env:viewe_esp32s3
build_src_filter = -<*> +<link_diag.cpp>
