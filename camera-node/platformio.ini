; =============================================================================
; camera-node  —  XIAO ESP32-S3 Sense (OV2640)
;
; Streams a low-res JPEG preview over UART and grabs a full-res still on
; command. See ../photobooth_build_plan.md §5.
;
; PSRAM is REQUIRED (camera frame buffers live there). The board_build settings
; below enable the 8 MB OPI PSRAM on the XIAO ESP32-S3.
; =============================================================================
; Only build/upload the real app by default. The `diag` env is opt-in via
; `-e diag`, so the Upload button never accidentally flashes the diagnostic.
[platformio]
default_envs = seeed_xiao_esp32s3

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Confirm the current toolchain when you first build; this pins a known-good
; Arduino-ESP32 core generation.
platform_packages =
    platformio/framework-arduinoespressif32

; --- PSRAM (OPI, 8 MB on the XIAO ESP32-S3) ---
board_build.arduino.memory_type = qio_opi

; The link diagnostic (src/link_diag.cpp) has its own setup()/loop() and is only
; built in [env:diag]. Exclude it here so it doesn't clash with main.cpp.
build_src_filter = +<*> -<link_diag.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3        ; Serial debug logs during bring-up
    ; Debug `Serial` -> native USB CDC, so UART0/GPIO43-44 is free for the link.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; The esp_camera component ships with the Arduino-ESP32 core, so no lib_deps
; for it. The shared framing/CRC library lives one level up.
lib_extra_dirs = ../shared
lib_deps = photobooth

monitor_speed = 115200

; --- Milestone-1 link diagnostic (build plan §10.1) --------------------------
; Compiles ONLY src/link_diag.cpp: sends a framed counter once a second and
; prints any ACK it gets back. Build/upload with:  pio run -e diag -t upload
[env:diag]
extends = env:seeed_xiao_esp32s3
build_src_filter = -<*> +<link_diag.cpp>
